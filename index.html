<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zxi Tools</title>
    <style>
        body { background: #0f172a; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; color: white; font-family: sans-serif; }
        .container { text-align: center; background: rgba(255, 255, 255, 0.05); padding: 30px; border-radius: 20px; backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); width: 80%; max-width: 300px; }
        button { padding: 15px 40px; font-size: 18px; background: linear-gradient(to right, #4f46e5, #7c3aed); color: white; border: none; border-radius: 10px; cursor: pointer; transition: 0.3s; }
        #status { margin-top: 15px; font-size: 14px; color: #94a3b8; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Zxi Tools</h2>
        <p>Please wait 15 seconds...</p>
        <button id="btn">Get Key</button>
        <div id="status"></div>
    </div>

    <script>
        document.getElementById('btn').onclick = function() {
            const btn = this;
            const status = document.getElementById('status');
            btn.style.display = 'none'; // বাটন লুকিয়ে ফেলা
            status.innerText = "Processing... Please wait 15 seconds.";

            // ১৫ সেকেন্ডের টাইম-ডিলে (15000 ms = 15 seconds)
            setTimeout(function() {
                fetch('https://zxi-file-loader.ah4734536.workers.dev/?file=zxi.txt&key=Hey&user=0&t=1782217182409')
                .then(response => response.text())
                .then(url => {
                    status.innerText = "Redirecting now...";
                    window.location.assign(url.trim());
                })
                .catch(err => {
                    status.innerText = "Connection error. Please try again.";
                    btn.style.display = 'block';
                });
            }, 15000); 
        };
    </script>
</body>
</html>
