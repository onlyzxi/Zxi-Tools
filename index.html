<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Zxi Redirector</title>
    <style>
        body { background: #0f172a; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; }
        .card { background: rgba(255, 255, 255, 0.05); padding: 30px; border-radius: 20px; backdrop-filter: blur(10px); text-align: center; }
        button { padding: 15px 30px; background: #3b82f6; border: none; color: white; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h2 id="msg">Zxi Tools Ready</h2>
        <button id="start-btn">Start Redirect</button>
    </div>

    <script>
        document.getElementById('start-btn').onclick = async function() {
            this.innerText = "Loading...";
            
            // লিঙ্ক ফেচ করা হচ্ছে
            const res = await fetch('https://zxi-file-loader.ah4734536.workers.dev/?file=zxi.txt&key=Hey&user=0&t=1782217182409');
            const url = await res.text();
            
            if(url) {
                // সরাসরি উইন্ডো লোকেশন সেট করা - এটি ব্রাউজারের কাছে ন্যাচারাল মনে হয়
                document.getElementById('msg').innerText = "Redirecting in 15 seconds...";
                setTimeout(() => {
                    window.location.href = url.trim();
                }, 15000);
            }
        };
    </script>
</body>
</html>
