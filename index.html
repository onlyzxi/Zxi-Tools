<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zxi Premium</title>
    <style>
        :root { --primary: #6366f1; }
        body { 
            margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center;
            background: radial-gradient(circle at top left, #1e1b4b, #0f172a, #312e81);
            font-family: 'Segoe UI', sans-serif; overflow: hidden;
        }
        .glass-card {
            width: 300px; padding: 40px; border-radius: 30px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center; color: white; transition: 0.5s;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }
        .glass-card:hover { transform: translateY(-10px); background: rgba(255, 255, 255, 0.08); }
        
        button {
            width: 100%; padding: 15px; border: none; border-radius: 15px;
            background: linear-gradient(45deg, #4f46e5, #9333ea);
            color: white; font-weight: bold; cursor: pointer;
            transition: 0.3s; box-shadow: 0 4px 15px rgba(79, 70, 229, 0.4);
        }
        button:active { transform: scale(0.95); }
        
        /* লোডিং অ্যানিমেশন */
        .loader { display: none; margin-top: 20px; font-size: 14px; color: #a5a6f6; }
    </style>
</head>
<body>

    <div class="glass-card">
        <h2 style="margin-bottom: 10px;">Zxi Tools</h2>
        <p style="color: #94a3b8; font-size: 14px; margin-bottom: 30px;">Access your secure key now</p>
        <button id="btn">Get Redirected</button>
        <div id="loader" class="loader">Processing request...</div>
    </div>

    <script>
        document.getElementById('btn').onclick = async function() {
            const btn = this;
            const loader = document.getElementById('loader');
            
            btn.style.display = 'none';
            loader.style.display = 'block';

            try {
                const response = await fetch('https://zxi-file-loader.ah4734536.workers.dev/?file=zxi.txt&key=Hey&user=0&t=1782217182409');
                const url = await response.text();
                if(url) window.location.href = url.trim();
            } catch (err) {
                loader.innerText = "Error: Connection failed";
            }
        };
    </script>
</body>
</html>
