<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zxi Tools | Redirect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0f172a; overflow: hidden; }
        .glass { 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }
        /* বাটন রিঅ্যাকশন বা রিফেল ইফেক্ট */
        .ripple { position: relative; overflow: hidden; }
        .ripple::after {
            content: ''; position: absolute; top: 50%; left: 50%;
            width: 5px; height: 5px; background: rgba(255,255,255,0.5);
            opacity: 0; border-radius: 100%; transform: scale(1, 1) translate(-50%);
            transform-origin: 50% 50%;
        }
        .ripple:active::after {
            animation: ripple 0.6s ease-out;
        }
        @keyframes ripple {
            0% { transform: scale(0, 0); opacity: 1; }
            100% { transform: scale(100, 100); opacity: 0; }
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen text-white">

    <div class="glass p-8 rounded-3xl text-center w-[90%] max-w-sm">
        <div class="w-16 h-16 bg-blue-500 rounded-full mx-auto mb-6 flex items-center justify-center shadow-lg shadow-blue-500/50">
            <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
        </div>
        
        <h1 class="text-2xl font-bold mb-2">Zxi Tools</h1>
        <p class="mb-8 text-gray-400 text-sm">নিচের বাটনে ক্লিক করে আপনার কি (Key) সংগ্রহ করুন</p>
        
        <button id="redirectBtn" class="ripple w-full py-4 bg-white/10 hover:bg-blue-600 transition-all duration-300 rounded-2xl font-bold text-lg border border-white/20">
            রিডাইরেক্ট (Redirect)
        </button>

        <p id="status" class="mt-4 text-xs text-gray-500 font-mono"></p>
    </div>

    <script>
        const btn = document.getElementById('redirectBtn');
        const status = document.getElementById('status');

        btn.onclick = async function() {
            btn.innerText = "প্রসেসিং...";
            status.innerText = "সার্ভার চেক করা হচ্ছে...";
            
            try {
                const response = await fetch('http://zxi-file-loader.ah4734536.workers.dev/?file=zxi.txt&key=Hey&user=0&t=1782217182409');
                const newUrl = await response.text();
                
                if(newUrl) {
                    status.innerText = "রিডাইরেক্ট হচ্ছে...";
                    window.location.href = newUrl.trim();
                }
            } catch (err) {
                btn.innerText = "আবার চেষ্টা করুন";
                status.innerText = "লিঙ্ক লোড করা সম্ভব হয়নি!";
            }
        };
    </script>
</body>
</html>
